<title>حساب‌داری فروشگاه صانع</title>
<style>
  :root{
    --ink:#1B2430;
    --ink2:#242f3f;
    --paper:#F5F4EF;
    --card:#FFFFFF;
    --gold:#C9922B;
    --gold-d:#a97a20;
    --green:#2E7D5B;
    --green-bg:#e7f3ee;
    --red:#C0392B;
    --red-bg:#fbeae8;
    --muted:#6b7280;
    --border:#E4E1D8;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Vazirmatn','Noto Sans Arabic',Tahoma,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:78px;
  }
  .num{font-variant-numeric:tabular-nums;direction:ltr;unicode-bidi:isolate;font-family:'Vazirmatn',Tahoma,sans-serif;}
  header.topbar{
    background:var(--ink);
    color:#fff;
    padding:14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;top:0;z-index:20;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  header.topbar .brand{display:flex;flex-direction:column;gap:2px;}
  header.topbar .brand b{font-size:16px;}
  header.topbar .brand span{font-size:11px;color:#c9c4b6;}
  header.topbar button{
    background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:6px;
  }
  main#screen{padding:14px;max-width:640px;margin:0 auto;}
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px;
    margin-bottom:12px;
  }
  .hero{
    background:linear-gradient(135deg,var(--ink) 0%, var(--ink2) 100%);
    color:#fff;
    border-radius:16px;
    padding:16px;
    margin-bottom:14px;
  }
  .hero .row{display:flex;justify-content:space-between;align-items:flex-end;padding:8px 0;border-bottom:1px dashed rgba(255,255,255,.15);}
  .hero .row:last-child{border-bottom:none;}
  .hero .row .label{font-size:12.5px;color:#c9c4b6;}
  .hero .row .val{font-size:19px;font-weight:700;color:var(--gold);}
  .hero .row .val.green{color:#6fd9ac;}
  .hero .row .val.red{color:#f28b7f;}
  .ledger-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
  .ledger-strip .chip{
    flex:0 0 auto;background:#fff;border:1px solid var(--border);border-radius:12px;
    padding:10px 14px;min-width:108px;text-align:center;
  }
  .ledger-strip .chip .t{font-size:11px;color:var(--muted);margin-bottom:4px;}
  .ledger-strip .chip .v{font-size:15px;font-weight:700;border-bottom:2px solid var(--gold);display:inline-block;padding-bottom:2px;}
  h2.section-title{font-size:15px;margin:18px 0 8px;color:var(--ink);border-right:4px solid var(--gold);padding-right:8px;}
  .quick-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
  .qa-btn{
    background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 4px;
    text-align:center;font-size:12.5px;cursor:pointer;color:var(--ink);
  }
  .qa-btn .ic{font-size:22px;display:block;margin-bottom:4px;}
  .row-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13.5px;}
  .row-item:last-child{border-bottom:none;}
  .row-item .r-left{display:flex;flex-direction:column;gap:2px;}
  .row-item .r-left .sub{font-size:11.5px;color:var(--muted);}
  .row-item .r-right{font-weight:700;}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
  .badge.green{background:var(--green-bg);color:var(--green);}
  .badge.red{background:var(--red-bg);color:var(--red);}
  .badge.gold{background:#faf1de;color:var(--gold-d);}
  label{display:block;font-size:12.5px;color:var(--muted);margin:10px 0 4px;}
  input,select,textarea{
    width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;
    font-size:14.5px;background:#fff;color:var(--ink);font-family:inherit;
  }
  textarea{resize:vertical;min-height:50px;}
  .btn{
    display:inline-block;width:100%;padding:12px;border-radius:12px;border:none;
    font-size:15px;font-weight:700;cursor:pointer;text-align:center;margin-top:12px;
  }
  .btn-primary{background:var(--gold);color:#fff;}
  .btn-primary:active{background:var(--gold-d);}
  .btn-outline{background:#fff;border:1px solid var(--border);color:var(--ink);}
  .btn-danger{background:var(--red);color:#fff;}
  .btn-green{background:var(--green);color:#fff;}
  .btn-sm{width:auto;padding:7px 14px;font-size:13px;margin-top:0;}
  .item-row{display:flex;justify-content:space-between;align-items:center;background:var(--paper);border-radius:10px;padding:8px 10px;margin-bottom:6px;font-size:13px;}
  .item-row .x{color:var(--red);cursor:pointer;font-weight:900;padding:0 6px;}
  .total-line{display:flex;justify-content:space-between;font-size:16px;font-weight:800;padding:10px 0;border-top:2px solid var(--ink);margin-top:6px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .tabbar-sub{display:flex;gap:6px;margin-bottom:12px;}
  .tabbar-sub button{
    flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);background:#fff;
    font-size:13px;cursor:pointer;color:var(--ink);
  }
  .tabbar-sub button.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  nav.bottomnav{
    position:fixed;bottom:0;right:0;left:0;background:#fff;border-top:1px solid var(--border);
    display:flex;z-index:30;box-shadow:0 -2px 10px rgba(0,0,0,.06);
  }
  nav.bottomnav button{
    flex:1;background:none;border:none;padding:9px 2px 8px;text-align:center;cursor:pointer;color:var(--muted);
  }
  nav.bottomnav button.active{color:var(--gold-d);}
  nav.bottomnav .ic{display:block;font-size:20px;}
  nav.bottomnav .lb{display:block;font-size:10.5px;margin-top:2px;}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:24px 8px;}
  .more-list button{
    width:100%;display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--border);
    border-radius:12px;padding:14px;margin-bottom:9px;font-size:14.5px;cursor:pointer;color:var(--ink);text-align:right;
  }
  .more-list .ic{font-size:20px;}
  .back-btn{background:none;border:none;color:var(--gold-d);font-size:14px;cursor:pointer;padding:0 0 10px;font-weight:700;}
  .field-note{font-size:11.5px;color:var(--muted);margin-top:4px;}
  .divider{border:none;border-top:1px solid var(--border);margin:14px 0;}
  .period-btns{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
  .period-btns button{padding:8px 12px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:12.5px;cursor:pointer;}
  .period-btns button.active{background:var(--gold);color:#fff;border-color:var(--gold);}

  /* ---------- Invoice / Print ---------- */
  .inv-actions{display:flex;gap:8px;margin-bottom:14px;}
  .inv-actions .btn{margin-top:0;}
  .inv-actions .btn-wa{background:#25D366;color:#fff;}
  .inv-head{text-align:center;padding:10px 0 16px;border-bottom:2px dashed var(--border);margin-bottom:14px;}
  .inv-head .logo{font-size:38px;line-height:1;margin-bottom:4px;}
  .inv-head .biz{font-size:19px;font-weight:800;color:var(--ink);}
  .inv-head .sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .inv-meta{display:flex;justify-content:space-between;font-size:13px;margin-bottom:10px;background:var(--paper);border-radius:10px;padding:10px 12px;}
  .inv-meta b{color:var(--gold-d);}
  .inv-cust{font-size:13.5px;background:var(--paper);border-radius:10px;padding:10px 12px;margin-bottom:14px;}
  .inv-cust .l1{font-weight:700;margin-bottom:2px;}
  table.inv-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:10px;}
  table.inv-table th{background:var(--ink);color:#fff;padding:7px 5px;font-size:11.5px;}
  table.inv-table td{padding:7px 5px;border-bottom:1px solid var(--border);text-align:center;}
  table.inv-table td:nth-child(2){text-align:right;}
  .inv-totals{margin-top:8px;}
  .inv-totals .row-item{font-size:13.5px;}
  .inv-footer{margin-top:18px;text-align:center;font-size:12px;color:var(--muted);}
  .inv-sign{display:flex;justify-content:space-between;margin-top:34px;font-size:12px;color:var(--muted);}
  .inv-sign .line{border-top:1px solid var(--muted);width:110px;padding-top:4px;text-align:center;}
  .row-item.clickable{cursor:pointer;}
  .bill-thumb{max-width:120px;max-height:120px;border-radius:8px;border:1px solid var(--border);cursor:pointer;display:block;}
  .img-viewer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.86);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:20px;}
  .img-viewer-overlay img{max-width:92vw;max-height:76vh;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.5);}
  .img-viewer-close{background:#fff;border:none;border-radius:20px;padding:9px 20px;font-size:14px;font-weight:700;cursor:pointer;}
  @media print{
    body *{visibility:hidden;}
    header.topbar, nav.bottomnav{display:none !important;}
    #invoice-print, #invoice-print *{visibility:visible;}
    #invoice-print{position:absolute;top:0;right:0;left:0;width:100%;padding:12px;}
    .no-print, .img-viewer-overlay{display:none !important;}
    body{padding-bottom:0;background:#fff;}
  }
</style>

<body>
<header class="topbar">
  <div class="brand"><b id="biz-name">فروشگاه صانع</b><span id="biz-date"></span></div>
  <button onclick="App.navigate('more','settings')">⚙️</button>
</header>
<main id="screen"></main>
<nav class="bottomnav" id="bottomnav"></nav>

<script type="module">
/* ---------- Firebase ---------- */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, setPersistence, browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import {
  initializeFirestore, persistentLocalCache, persistentMultipleTabManager,
  doc, getDoc, getDocs, setDoc, updateDoc, deleteDoc, onSnapshot,
  collection, writeBatch, increment
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1ro1e1rwR7dB9gHGWQkwq2G2r1ZolLGs",
  authDomain: "motar-pakhsh.firebaseapp.com",
  projectId: "motar-pakhsh",
  storageBucket: "motar-pakhsh.firebasestorage.app",
  messagingSenderId: "220111355867",
  appId: "1:220111355867:web:22fe8b83980f82f2cb71fe"
};
const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = initializeFirestore(fbApp, {
  localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
});
setPersistence(auth, browserLocalPersistence).catch(()=>{});

const BIZ_ID = 'main';
/* هر نوع رکورد حالا کالکشن جدای خودش را دارد — دیگر یک سند مشترک بزرگ نیست.
   یعنی ویرایش یک فاکتور، رکورد فاکتور دیگری را از دست نمی‌برد. */
const COLLECTIONS = ['products','customers','suppliers','sales','purchases','expenses','payments','openingEntries'];
const cols = {};
COLLECTIONS.forEach(name => { cols[name] = collection(db, 'businesses', BIZ_ID, name); });
const settingsDocRef   = doc(db, 'businesses', BIZ_ID, 'meta', 'settings');
const migratedFlagRef  = doc(db, 'businesses', BIZ_ID, 'meta', 'migratedV2');
const oldStateDocRef   = doc(db, 'businesses', BIZ_ID, 'data', 'state'); // ساختار قدیمی (فقط برای مهاجرت یک‌باره)
const teamDocRef       = (uid_) => doc(db, 'businesses', BIZ_ID, 'team', uid_);

/* ---------- Helpers ---------- */
function uid(){ return 'id_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmt(n){ n = Math.round(Number(n)||0); return n.toLocaleString('en-US'); }
function escapeHtml(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function sum(arr,key){ return arr.reduce((a,b)=>a+(Number(b[key])||0),0); }
/* ---------- فشرده‌سازی عکس (بل شرکت / رسید پرداخت) ----------
   عکس‌ها به‌صورت JPEG فشرده و base64 مستقیم داخل سند Firestore ذخیره می‌شوند
   (نه Firebase Storage) تا کاملاً با ذخیره‌سازی آفلاین فایراستور سازگار بمانند
   و بدون اتصال اینترنت هم ثبت و بعداً خودکار سینک شوند. سقف سند فایراستور ۱ مگابایت
   است، پس عکس تا حد امن (~700 کیلوبایت base64) فشرده می‌شود. */
function _loadImageFromFile(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=>reject(new Error('خواندن فایل عکس ناکام شد'));
    reader.onload = (e)=>{
      const img = new Image();
      img.onerror = ()=>reject(new Error('این فایل یک عکس معتبر نیست'));
      img.onload = ()=>resolve(img);
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
function _resizeImageToDataUrl(img, maxDim, quality){
  let w=img.width, h=img.height;
  if(w>=h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
  else if(h>w && h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
  const canvas=document.createElement('canvas');
  canvas.width=w; canvas.height=h;
  canvas.getContext('2d').drawImage(img,0,0,w,h);
  return canvas.toDataURL('image/jpeg', quality);
}
async function compressImageForStorage(file){
  if(!file || !file.type || file.type.indexOf('image/')!==0){ throw new Error('لطفاً یک فایل عکس انتخاب کنید'); }
  const img = await _loadImageFromFile(file);
  const attempts = [[1100,0.62],[850,0.5],[650,0.4],[500,0.32]];
  let lastUrl=null;
  for(const [dim,q] of attempts){
    lastUrl = _resizeImageToDataUrl(img, dim, q);
    if(lastUrl.length < 700000) return lastUrl; // ~500KB باینری، امن زیر سقف ۱ مگابایتی سند
  }
  if(lastUrl.length < 950000) return lastUrl;
  throw new Error('حجم عکس بعد از فشرده‌سازی هنوز زیاد است؛ لطفاً با نور بهتر یا نزدیک‌تر دوباره عکس بگیرید.');
}
function dateLabel(d){
  const dt=new Date(d+'T00:00:00');
  const days=['یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنجشنبه','جمعه','شنبه'];
  return days[dt.getDay()]+' '+d;
}
function startOfWeek(d){
  const dt=new Date(d+'T00:00:00');
  const day=dt.getDay();
  dt.setDate(dt.getDate()-day);
  return dt.toISOString().slice(0,10);
}
function startOfMonth(d){ return d.slice(0,7)+'-01'; }

function defaultSettings(){
  return { businessName:'فروشگاه صانع', currency:'افغانی', openingCash:0,
    invoiceCounter:0, businessPhone:'', businessAddress:'', logoEmoji:'🏪', openingNote:'', usdRate:0 };
}
function migrateSettings(s){
  s = s || {};
  if(s.invoiceCounter===undefined) s.invoiceCounter=0;
  if(s.businessName===undefined) s.businessName='فروشگاه صانع';
  if(s.currency===undefined) s.currency='افغانی';
  if(s.openingCash===undefined) s.openingCash=0;
  if(s.businessPhone===undefined) s.businessPhone='';
  if(s.businessAddress===undefined) s.businessAddress='';
  if(s.logoEmoji===undefined) s.logoEmoji='🏪';
  if(s.openingNote===undefined) s.openingNote='';
  if(s.usdRate===undefined) s.usdRate=0;
  return s;
}
function migrateRecordArrays(sales, purchases){
  (sales||[]).forEach(s=>{
    if(!s.status) s.status='active';
    if(!s.returns) s.returns=[];
    if(s.originalTotal===undefined) s.originalTotal=s.total;
    (s.items||[]).forEach(it=>{ if(it.returnedQty===undefined) it.returnedQty=0; });
  });
  (purchases||[]).forEach(p=>{
    if(!p.status) p.status='active';
    if(!p.returns) p.returns=[];
    if(p.originalTotal===undefined) p.originalTotal=p.total;
    if(!p.currency) p.currency='AFN';
    if(p.rateAtPurchase===undefined) p.rateAtPurchase=0;
    (p.items||[]).forEach(it=>{ if(it.returnedQty===undefined) it.returnedQty=0; });
  });
}

/* ---------- Migration: انتقال یک‌بارهٔ دیتای قدیمی (یک سند مشترک) به کالکشن‌های جدید ---------- */
async function migrateOldDataIfNeeded(){
  try{
    const flagSnap = await getDoc(migratedFlagRef);
    if(flagSnap.exists() && flagSnap.data().done) return; // قبلاً انجام شده

    const oldSnap = await getDoc(oldStateDocRef);
    if(!oldSnap.exists()){
      await setDoc(migratedFlagRef, {done:true, ts:Date.now(), note:'دیتای قدیمی وجود نداشت'});
      return;
    }
    const old = oldSnap.data();
    migrateSettings(old.settings);
    migrateRecordArrays(old.sales, old.purchases);

    const allRecords = [];
    (old.products||[]).forEach(r=>allRecords.push(['products',r]));
    (old.customers||[]).forEach(r=>allRecords.push(['customers',r]));
    (old.suppliers||[]).forEach(r=>allRecords.push(['suppliers',r]));
    (old.sales||[]).forEach(r=>allRecords.push(['sales',r]));
    (old.purchases||[]).forEach(r=>allRecords.push(['purchases',r]));
    (old.expenses||[]).forEach(r=>allRecords.push(['expenses',r]));
    (old.payments||[]).forEach(r=>allRecords.push(['payments',r]));
    (old.openingEntries||[]).forEach(r=>allRecords.push(['openingEntries',r]));

    // نوشتن دسته‌ای (هر batch حداکثر ۴۰۰ عملیات، برای اطمینان زیر سقف ۵۰۰ فایراستور)
    for(let i=0;i<allRecords.length;i+=400){
      const chunk = allRecords.slice(i,i+400);
      const batch = writeBatch(db);
      chunk.forEach(([colName,rec])=>{
        if(!rec.id) rec.id=uid();
        batch.set(doc(cols[colName], rec.id), rec);
      });
      await batch.commit();
    }
    await setDoc(settingsDocRef, migrateSettings(old.settings));
    await setDoc(migratedFlagRef, {done:true, ts:Date.now(), migratedCount:allRecords.length});
    console.log('مهاجرت دیتای قدیمی به ساختار جدید با موفقیت انجام شد. سند قدیمی به‌عنوان نسخهٔ پشتیبان دست‌نخورده باقی ماند.');
  }catch(e){
    console.error('خطا در مهاجرت دیتای قدیمی:', e);
  }
}

/* ---------- App ---------- */
const App = {
  state: { settings: defaultSettings(), products:[], customers:[], suppliers:[], sales:[], purchases:[], expenses:[], payments:[], openingEntries:[] },
  tab:'dashboard', sub:null,
  saleDraft:null, purchaseDraft:null,
  reportPeriod:'today', reportStart:null, reportEnd:null,
  user:null, role:null, authReady:false, dataReady:false, imageViewerSrc:null, payFormOpen:false,
  _loadedParts:null, _unsubs:null,

  init(){
    this.resetSaleDraft();
    this.resetPurchaseDraft();
    this.renderLoading();
    onAuthStateChanged(auth, (u)=>{
      this.user = u;
      if(u){ this.afterLogin(u); }
      else { this.role=null; this.dataReady=false; this._teardown(); this.renderLogin(); }
    });
  },

  renderLoading(){
    document.getElementById('bottomnav').innerHTML='';
    document.getElementById('biz-name').textContent='فروشگاه صانع';
    document.getElementById('biz-date').textContent='';
    document.getElementById('screen').innerHTML = `
    <div class="card" style="margin-top:40px;text-align:center;color:#c9c4b6;">
      در حال بارگذاری...
    </div>`;
  },

  /* نقش کاربر: بعد از هر ورود موفق آنلاین، محلی (روی همین گوشی) ذخیره می‌شود.
     اگر بعداً برای اولین‌بار روی این گوشی آفلاین وارد شود، از همان نقش ذخیره‌شده استفاده می‌شود
     نه اینکه خودکار staff در نظر گرفته شود. */
  _roleCacheKey(uid_){ return 'hesabdari_role_'+uid_; },
  async afterLogin(u){
    const cacheKey = this._roleCacheKey(u.uid);
    try{
      const teamSnap = await getDoc(teamDocRef(u.uid));
      this.role = teamSnap.exists() ? (teamSnap.data().role||'staff') : 'staff';
      try{ localStorage.setItem(cacheKey, this.role); }catch(e){}
    }catch(e){
      let cached=null;
      try{ cached = localStorage.getItem(cacheKey); }catch(e2){}
      this.role = cached || 'staff';
    }

    await migrateOldDataIfNeeded();
    this._subscribeAll();
  },

  _teardown(){
    if(this._unsubs){ this._unsubs.forEach(fn=>{ try{ fn(); }catch(e){} }); }
    this._unsubs=[];
  },

  _subscribeAll(){
    this._teardown();
    this._loadedParts = new Set();
    const totalParts = COLLECTIONS.length + 1; // + settings

    const checkReady = ()=>{
      if(!this.dataReady && this._loadedParts.size>=totalParts){
        this.dataReady = true;
      }
      document.getElementById('biz-name').textContent = this.state.settings.businessName || 'فروشگاه صانع';
      document.getElementById('biz-date').textContent = dateLabel(todayISO());
      this.renderNav();
      this.render();
    };

    COLLECTIONS.forEach(name=>{
      const unsub = onSnapshot(cols[name], (snap)=>{
        const arr = [];
        snap.forEach(d=>arr.push(d.data()));
        this.state[name] = arr;
        if(name==='sales' || name==='purchases') migrateRecordArrays(this.state.sales, this.state.purchases);
        this._loadedParts.add(name);
        checkReady();
      }, (err)=>console.error('sync error ('+name+')', err));
      this._unsubs.push(unsub);
    });

    const unsubSettings = onSnapshot(settingsDocRef, async (snap)=>{
      if(snap.exists()){
        this.state.settings = migrateSettings(snap.data());
      } else {
        this.state.settings = defaultSettings();
        try{ await setDoc(settingsDocRef, this.state.settings); }catch(e){}
      }
      this._loadedParts.add('settings');
      checkReady();
    }, (err)=>console.error('sync error (settings)', err));
    this._unsubs.push(unsubSettings);
  },

  /* ---------- Computations (بدون تغییر) ---------- */
  cashBalance(){
    const s=this.state;
    let cash = Number(s.settings.openingCash)||0;
    cash += sum(s.sales,'paid');
    cash += sum(s.payments.filter(p=>p.type==='receive'),'amount');
    s.purchases.forEach(p=>{
      const paidAFN = p.currency==='USD' ? (Number(p.paid)||0)*((Number(p.rateAtPurchase)||this.usdRate())||0) : (Number(p.paid)||0);
      cash -= paidAFN;
    });
    s.payments.filter(p=>p.type==='pay').forEach(p=>{
      const amtAFN = p.currency==='USD' ? (Number(p.amount)||0)*((Number(p.rate)||this.usdRate())||0) : (Number(p.amount)||0);
      cash -= amtAFN;
    });
    cash -= sum(s.expenses,'amount');
    return cash;
  },
  inventoryValue(){
    return this.state.products.reduce((a,p)=>a+(p.stock*p.avgCost),0);
  },
  totalReceivable(){ return this.state.customers.reduce((a,c)=>a+Math.max(0,c.balance||0),0); },
  totalPayable(){ return this.state.suppliers.reduce((a,c)=>a+Math.max(0,c.balance||0),0); },
  totalPayableUSD(){ return this.state.suppliers.reduce((a,c)=>a+Math.max(0,c.balanceUSD||0),0); },
  usdRate(){ return Number(this.state.settings.usdRate)||0; },
  totalPayableUSDInAFN(){ return this.totalPayableUSD() * this.usdRate(); },
  totalPayableCombinedAFN(){ return this.totalPayable() + this.totalPayableUSDInAFN(); },
  curLabel(code){ return code==='USD' ? 'دالر' : this.state.settings.currency; },
  quickSetUsdRate(){
    const cur = this.state.settings.usdRate || '';
    const val = prompt('نرخ فعلی دالر را وارد کنید (۱ دالر = چند افغانی؟):', cur||'');
    if(val===null) return;
    const rate = parseFloat(val);
    if(!rate || rate<=0){ alert('نرخ نامعتبر است.'); return; }
    updateDoc(settingsDocRef, {usdRate:rate}).then(()=>{ this.render(); }).catch(e=>{ console.error(e); alert('خطا؛ دوباره تلاش کنید.'); });
  },
  salesInRange(start,end){
    return this.state.sales.filter(x=>x.date>=start && x.date<=end);
  },
  expensesInRange(start,end){
    return this.state.expenses.filter(x=>x.date>=start && x.date<=end);
  },
  purchasesInRange(start,end){
    return this.state.purchases.filter(x=>x.date>=start && x.date<=end);
  },

      <div class="chip"><div class="t">فروش امروز</div><div class="v num">${fmt(sum(todaySales,'total'))}</div></div>
      <div class="chip"><div class="t">مصرف امروز</div><div class="v num">${fmt(sum(todayExpenses,'amount'))}</div></div>
      <div class="chip"><div class="t">طلب از مشتریان</div><div class="v num">${fmt(this.totalReceivable())}</div></div>
      <div class="chip"><div class="t">قرض از عمده‌فروش (${cur})</div><div class="v num">${fmt(this.totalPayable())}</div></div>
      ${this.totalPayableUSD()!==0?`<div class="chip"><div class="t">قرض از عمده‌فروش (دالر)</div><div class="v num">$${fmt(this.totalPayableUSD())}</div></div>`:''}
      ${this.totalPayableUSD()!==0 && this.usdRate()>0?`<div class="chip"><div class="t">مجموع کل قرض به ${cur}</div><div class="v num">${fmt(this.totalPayableCombinedAFN())}</div></div>`:''}
      <div class="chip" onclick="App.quickSetUsdRate()" style="cursor:pointer;"><div class="t">✏️ نرخ دالر</div><div class="v num">${this.usdRate()>0?fmt(this.usdRate()):'تنظیم کنید'}</div></div>

  /* ---------- Sale ---------- */
  addSaleItem(){
    const sel=document.getElementById('sp-product');
    let pid=sel.value;
    if(!pid){ alert('یک محصول انتخاب کنید'); return; }
    let product;
    if(pid==='__new__'){
      const name=(document.getElementById('sp-newname').value||'').trim();
      const unit=(document.getElementById('sp-newunit').value||'').trim()||'عدد';
      if(!name){ alert('نام محصول جدید را بنویسید'); return; }
      // نکته: این محصول هنوز در دیتابیس ذخیره نمی‌شود؛ فقط وقتی فاکتور نهایی ثبت شود ذخیره خواهد شد
      // (تا اگر فاکتور رها شود، محصول یتیم با موجودی صفر در فهرست باقی نماند)
      product = { id: uid(), name, unit, stock:0, avgCost:0, sellPrice:0, _draftOnly:true };
      this.saleDraft._draftProducts = this.saleDraft._draftProducts || [];
      this.saleDraft._draftProducts.push(product);
    } else {
      product = this.state.products.find(p=>p.id===pid);
    }
    if(!product){ alert('محصول یافت نشد'); return; }
    const qty=parseFloat(document.getElementById('sp-qty').value);
    const price=parseFloat(document.getElementById('sp-price').value);
    if(!qty||qty<=0){ alert('تعداد را درست بنویسید'); return; }
    if(isNaN(price)||price<0){ alert('قیمت فروش را بنویسید'); return; }
    if(qty>product.stock){
      if(!confirm('موجودی این محصول کافی نیست ('+product.stock+' '+product.unit+' باقی‌مانده). آیا ادامه می‌دهید؟')) return;
    }
    this.saleDraft.items.push({productId:product.id,name:product.name,unit:product.unit,qty,unitPrice:price,cost:product.avgCost});
    this.render();
  },
  removeSaleItem(idx){ this.saleDraft.items.splice(idx,1); this.render(); },

  submitSale(){
    if(this.saleDraft.items.length===0){ alert('حداقل یک محصول اضافه کنید'); return; }
    const total = this.saleDraft.items.reduce((a,i)=>a+i.qty*i.unitPrice,0);
    const totalCost = this.saleDraft.items.reduce((a,i)=>a+i.qty*i.cost,0);
    let paid = parseFloat(document.getElementById('sale-paid').value);
    if(isNaN(paid)) paid=0;
    if(paid>total) paid=total;
    if(paid<0) paid=0;
    const custName = (document.getElementById('sale-customer-name').value||'').trim();
    const custPhone = (document.getElementById('sale-customer-phone').value||'').trim();
    const custAddress = (document.getElementById('sale-customer-address').value||'').trim();
    const date = document.getElementById('sale-date').value || todayISO();
    const note = (document.getElementById('sale-note').value||'').trim();
    const remaining = total-paid;

    const batch = writeBatch(db);
    let customerId=null, customerNameFinal='مشتری نقدی';
    if(custName){
      let customer=this.state.customers.find(c=>c.name===custName);
      if(!customer){
        customerId=uid(); customerNameFinal=custName;
        batch.set(doc(cols.customers,customerId), {id:customerId,name:custName,phone:custPhone,address:custAddress,balance:remaining});
      } else {
        customerId=customer.id; customerNameFinal=customer.name;
        const fields={ balance: increment(remaining) };
        if(custPhone && !customer.phone) fields.phone=custPhone;
        if(custAddress && !customer.address) fields.address=custAddress;
        batch.update(doc(cols.customers,customer.id), fields);
      }
    } else if(remaining>0.001){
      alert('برای فروش قرضی (نسیه) باید نام مشتری را بنویسید'); return;
    }

    // محصولات جدیدی که فقط در پیش‌نویس بودند، حالا برای اولین بار ذخیره می‌شوند
    const draftProducts = this.saleDraft._draftProducts || [];
    this.saleDraft.items.forEach(it=>{
      const draftP = draftProducts.find(dp=>dp.id===it.productId);
      if(draftP){
        batch.set(doc(cols.products, draftP.id), {id:draftP.id, name:draftP.name, unit:draftP.unit, stock:-it.qty, avgCost:0, sellPrice:it.unitPrice});
      } else {
        batch.update(doc(cols.products, it.productId), { stock: increment(-it.qty) });
      }
    });

    const saleId = uid();
    const newSale = {
      id:saleId, ts:Date.now(), date, customerId, customerName:customerNameFinal,
      customerPhone: custName?custPhone:'', customerAddress: custName?custAddress:'',
      items:this.saleDraft.items.map(it=>({...it,returnedQty:0})), total, totalCost, profit: total-totalCost,
      paid, remaining, note, status:'active', returns:[], originalTotal: total
    };
    batch.set(doc(cols.sales, saleId), newSale);

    batch.commit().catch(e=>{ console.error('submitSale error',e); alert('خطا در ذخیرهٔ فاکتور؛ اتصال اینترنت را بررسی کنید (در حالت آفلاین هم باید ذخیره شود، دوباره تلاش کنید).'); });

    this.resetSaleDraft();
    this.viewInvoiceId = saleId;
    this.navigate('invoice');
  },

  /* ---------- Invoice view / print / whatsapp ---------- */
  viewInvoice(id){ this.viewInvoiceId=id; this.navigate('invoice'); },
  printInvoice(){ window.print(); },
  // شمارهٔ فاکتور دیگر یک شمارندهٔ مشترک نیست (که در حالت آفلاین/هم‌زمان می‌توانست
  // برای دو فاکتور مختلف یک عدد تکراری بسازد)، بلکه از ترتیب زمانی خود فاکتورها
  // محاسبه می‌شود. چون هر فاکتور یک id یکتا دارد، هیچ‌وقت دو فاکتور شمارهٔ یکسان نمی‌گیرند،
  // حتی اگر چند نفر هم‌زمان و آفلاین فاکتور ثبت کرده باشند.
  saleSeqNo(saleId){
    const sorted = [...this.state.sales].sort((a,b)=> (a.ts||0)-(b.ts||0) || (a.id<b.id?-1:1));
    const idx = sorted.findIndex(s=>s.id===saleId);
    return idx>=0 ? idx+1 : 0;
  },
  invoiceNoLabel(saleId){ return '#'+String(this.saleSeqNo(saleId)).padStart(5,'0'); },
  waPhoneDigits(phone){
    let d=(phone||'').replace(/[^0-9]/g,'');
    if(!d) return '';
    if(d.startsWith('0093')) d='93'+d.slice(4);      // پیشوند بین‌المللی 00 + کد کشور (احتیاطی)
    else if(d.startsWith('00')) d=d.slice(2);        // پیشوند بین‌المللی 00 خام
    else if(d.startsWith('0')) d='93'+d.slice(1);    // شماره محلی با صفر → +93
    else if(!d.startsWith('93') && d.length<=10) d='93'+d; // بدون کد کشور و بدون صفر
    return d;
  },
  buildInvoiceText(sale){
    const s=this.state.settings;
    let lines=[];
    lines.push(`${s.logoEmoji||''} ${s.businessName}`.trim());
    if(s.businessPhone) lines.push('تماس: '+s.businessPhone);
    lines.push('———————————————');
    if(sale.status==='cancelled') lines.push('⚠️ این فاکتور باطل شده است');
    lines.push('فاکتور فروش '+this.invoiceNoLabel(sale.id));
    lines.push('تاریخ: '+sale.date);
    lines.push('مشتری: '+sale.customerName);
    if(sale.customerPhone) lines.push('تماس مشتری: '+sale.customerPhone);
    if(sale.customerAddress) lines.push('آدرس: '+sale.customerAddress);
    lines.push('———————————————');
    sale.items.forEach((it,idx)=>{
      const ret = it.returnedQty ? ` (مرجوعی: ${it.returnedQty})` : '';
      lines.push(`${idx+1}. ${it.name} — ${it.qty} ${it.unit} × ${fmt(it.unitPrice)} = ${fmt(it.qty*it.unitPrice)}${ret}`);
    });
    lines.push('———————————————');
    lines.push('مجموع فاکتور: '+fmt(sale.total)+' '+s.currency);
    lines.push('پرداخت‌شده: '+fmt(sale.paid)+' '+s.currency);
    if(sale.status==='cancelled') lines.push('وضعیت: باطل شده ❌');
    else if(sale.remaining>0.5) lines.push('باقیمانده (قرض): '+fmt(sale.remaining)+' '+s.currency);
    else lines.push('وضعیت: تسویه‌شده ✅');
    if(sale.note) lines.push('یادداشت: '+sale.note);
    lines.push('———————————————');
    lines.push('سند هذا بدون مهر و امضا اعتبار ندارد، جنس فروخته شده واپس گرفته نمی شود');
    return lines.join('\n');
  },
  sendInvoiceWhatsApp(id){
    const sale=this.state.sales.find(x=>x.id===id);
    if(!sale) return;
    const text=encodeURIComponent(this.buildInvoiceText(sale));
    const digits=this.waPhoneDigits(sale.customerPhone);
    const url = digits ? `https://wa.me/${digits}?text=${text}` : `https://wa.me/?text=${text}`;
    window.open(url,'_blank');
  },
  renderInvoiceView(){
    const sale=this.state.sales.find(x=>x.id===this.viewInvoiceId);
    if(!sale){
      return `<button class="back-btn" onclick="App.navigate('dashboard')">← بازگشت</button><div class="empty">فاکتور یافت نشد.</div>`;
    }
    const s=this.state.settings;
    const cancelled = sale.status==='cancelled';
    const itemsHtml = sale.items.map((it,idx)=>{
      const returned = it.returnedQty||0;
      return `

  addPurchaseItem(){
    const sel=document.getElementById('pp-product');
    let pid=sel.value;
    if(!pid){ alert('یک محصول انتخاب کنید'); return; }
    let product;
    if(pid==='__new__'){
      const name=(document.getElementById('pp-newname').value||'').trim();
      const unit=(document.getElementById('pp-newunit').value||'').trim()||'عدد';
      if(!name){ alert('نام محصول جدید را بنویسید'); return; }
      product = { id: uid(), name, unit, stock:0, avgCost:0, sellPrice:0, _draftOnly:true };
      this.purchaseDraft._draftProducts = this.purchaseDraft._draftProducts || [];
      this.purchaseDraft._draftProducts.push(product);
    } else {
      product = this.state.products.find(p=>p.id===pid);
    }
    if(!product){ alert('محصول یافت نشد'); return; }
    const qty=parseFloat(document.getElementById('pp-qty').value);
    const cost=parseFloat(document.getElementById('pp-cost').value);
    if(!qty||qty<=0){ alert('تعداد را درست بنویسید'); return; }
    if(isNaN(cost)||cost<0){ alert('قیمت خرید را بنویسید'); return; }
    this.purchaseDraft.items.push({productId:product.id,name:product.name,unit:product.unit,qty,unitCost:cost});
    this.render();
  },

  async submitPurchase(){
    if(this.purchaseDraft.items.length===0){ alert('حداقل یک محصول اضافه کنید'); return; }
    const total = this.purchaseDraft.items.reduce((a,i)=>a+i.qty*i.unitCost,0);
    let paid = parseFloat(document.getElementById('purchase-paid').value);
    if(isNaN(paid)) paid=0;
    if(paid>total) paid=total;
    if(paid<0) paid=0;
    const currency = (document.getElementById('purchase-currency') && document.getElementById('purchase-currency').value==='USD') ? 'USD' : 'AFN';
    let rateAtPurchase = 1;
    if(currency==='USD'){
      rateAtPurchase = this.usdRate();
      if(rateAtPurchase<=0){ alert('لطفاً ابتدا نرخ فعلی دالر را وارد کنید (دکمهٔ «نرخ دالر» بالای همین فرم).'); return; }
    }
    const balField = currency==='USD' ? 'balanceUSD' : 'balance';
    const supName = (document.getElementById('purchase-supplier-name').value||'').trim();
    const date = document.getElementById('purchase-date').value || todayISO();
    const note = (document.getElementById('purchase-note').value||'').trim();
    const remaining = total-paid;

    const batch = writeBatch(db);
    let supplierId=null, supplierNameFinal=supName||'—';
    if(supName){
      let supplier=this.state.suppliers.find(c=>c.name===supName);
      if(!supplier){
        supplierId=uid(); supplierNameFinal=supName;
        batch.set(doc(cols.suppliers,supplierId), {id:supplierId,name:supName,phone:'',address:'',balance:currency==='AFN'?remaining:0,balanceUSD:currency==='USD'?remaining:0});
      } else {
        supplierId=supplier.id; supplierNameFinal=supplier.name;
        batch.update(doc(cols.suppliers,supplier.id), { [balField]: increment(remaining) });
      }
    } else if(remaining>0.001){
      alert('برای خرید نسیه باید نام عمده‌فروش/شرکت را بنویسید'); return;
    }

    const draftProducts = this.purchaseDraft._draftProducts || [];
    this.purchaseDraft.items.forEach(it=>{
      const unitCostAFN = currency==='USD' ? it.unitCost*rateAtPurchase : it.unitCost;
      const draftP = draftProducts.find(dp=>dp.id===it.productId);
      if(draftP){
        batch.set(doc(cols.products, draftP.id), {id:draftP.id, name:draftP.name, unit:draftP.unit, stock:it.qty, avgCost:unitCostAFN, sellPrice:Math.round(unitCostAFN*1.15)});
      } else {
        const p = this.state.products.find(pp=>pp.id===it.productId);
        if(p){
          const newStock = p.stock + it.qty;
          const newAvgCost = newStock>0 ? ((p.stock*p.avgCost)+(it.qty*unitCostAFN))/newStock : unitCostAFN;
          const fields = { stock: increment(it.qty), avgCost: newAvgCost };
          if(!p.sellPrice) fields.sellPrice = Math.round(unitCostAFN*1.15);
          batch.update(doc(cols.products, it.productId), fields);
        }
      }
    });

    const photoInput = document.getElementById('purchase-bill-photo');
    const photoFile = photoInput && photoInput.files[0];
    let billImage = null;
    if(photoFile){
      try{ billImage = await compressImageForStorage(photoFile); }
      catch(err){ alert(err.message||'خطا در پردازش عکس بل'); return; }
    }

    const purchaseId = uid();
    const newPurchase = {
      id:purchaseId, ts:Date.now(), date, supplierId, supplierName:supplierNameFinal, currency, rateAtPurchase,
      items:this.purchaseDraft.items.map(it=>({...it,returnedQty:0})), total, paid, remaining, note,
      status:'active', returns:[], originalTotal: total
    };
    if(billImage) newPurchase.billImage = billImage;
    batch.set(doc(cols.purchases, purchaseId), newPurchase);

    batch.commit().catch(e=>{ console.error('submitPurchase error',e); alert('خطا در ذخیرهٔ بل خرید؛ اتصال اینترنت را بررسی کنید.'); });

    this.resetPurchaseDraft();
    this.viewPurchaseId = purchaseId;
    this.navigate('purchase-view');
  },

        ${pur.originalTotal!==undefined && Math.abs(pur.originalTotal-pur.total)>0.5?`<div class="row-item"><div class="r-left">مجموع اولیهٔ بل</div><div class="r-right num">${fmt(pur.originalTotal)} ${curLbl}</div></div>`:''}

        ${!cancelled && pur.currency==='USD' && pur.remaining>0.5 && this.usdRate()>0?`<div class="row-item"><div class="r-left">معادل باقیمانده به نرخ امروز</div><div class="r-right num" style="color:var(--red)">${fmt(pur.remaining*this.usdRate())} ${s.currency}</div></div>`:''}

  },

  /* ---------- Invoice adjustments: cancel / return / edit items (sales) ----------
     نکته: این عملیات‌ها به‌جای «بازخوانی و بازنویسی کل رکورد»، فقط تغییرات (delta) را
     با increment() می‌فرستند — یعنی حتی اگر دو نفر هم‌زمان کار کنند، هیچ نوشته‌ای گم نمی‌شود. */
  saleReturnItem(saleId, idx){
    const sale=this.state.sales.find(x=>x.id===saleId); if(!sale) return;
    if(sale.status==='cancelled'){ alert('این فاکتور باطل شده است.'); return; }
    const it=sale.items[idx]; if(!it) return;
    const sellable = it.qty-(it.returnedQty||0);
    if(sellable<=0){ alert('این قلم قبلاً بطور کامل مرجوعی خورده است.'); return; }
    const qtyStr=prompt(`چند عدد از «${it.name}» مرجوعی می‌شود؟ (حداکثر ${sellable} ${it.unit})`, sellable);
    if(qtyStr===null) return;
    const qty=parseFloat(qtyStr);
    if(!qty||qty<=0||qty>sellable){ alert('تعداد نامعتبر است.'); return; }
    this._applySaleReturn(sale, idx, qty);
  },
  _applySaleReturn(sale, idx, qty){
    const it=sale.items[idx];
    const refund = qty*it.unitPrice;
    const refundCost = qty*(it.cost||0);
    const oldRemaining = sale.total-sale.paid;
    const debtReduction = Math.min(refund, Math.max(0,oldRemaining));
    const cashRefund = refund-debtReduction;

    const newItems = sale.items.map((x,i)=> i===idx ? {...x, returnedQty:(x.returnedQty||0)+qty} : x);
    const newReturns = [...sale.returns, {id:uid(), ts:Date.now(), date:todayISO(), itemIndex:idx, name:it.name, qty, unitPrice:it.unitPrice, amount:refund}];

    const batch = writeBatch(db);
    batch.update(doc(cols.sales, sale.id), {
      items: newItems, returns: newReturns,
      total: increment(-refund), totalCost: increment(-refundCost), profit: increment(-(refund-refundCost)),
      paid: increment(-cashRefund), remaining: increment(-(cashRefund - (-debtReduction) - 0) ) // محاسبه دقیق پایین
    });
    // remaining = total-paid، برای سادگی و دقت مستقیم محاسبه و ست می‌کنیم نه increment مبهم:
    const newTotal = sale.total-refund, newPaid = sale.paid-cashRefund;
    batch.update(doc(cols.sales, sale.id), { remaining: newTotal-newPaid });
    if(sale.customerId && debtReduction>0){
      batch.update(doc(cols.customers, sale.customerId), { balance: increment(-debtReduction) });
    }
    batch.update(doc(cols.products, it.productId), { stock: increment(qty) });
    batch.commit().catch(e=>{ console.error(e); alert('خطا در ثبت مرجوعی؛ دوباره تلاش کنید.'); });
  },
  cancelSale(saleId){
    const sale=this.state.sales.find(x=>x.id===saleId); if(!sale) return;
    if(sale.status==='cancelled'){ alert('این فاکتور قبلاً باطل شده است.'); return; }
    if(!confirm('کل این فاکتور باطل شود؟ موجودی کالاها به انبار برمی‌گردد و بدهی مشتری اصلاح می‌شود.')) return;

    let runningTotal=sale.total, runningPaid=sale.paid, runningCost=sale.totalCost;
    let customerDebtReduction=0;
    const newItems=[...sale.items];
    const newReturns=[...sale.returns];
    const stockDeltas={};
    sale.items.forEach((it,idx)=>{
      const sellable=it.qty-(it.returnedQty||0);
      if(sellable<=0) return;
      const refund=sellable*it.unitPrice, refundCost=sellable*(it.cost||0);
      const oldRemaining=runningTotal-runningPaid;
      const debtReduction=Math.min(refund, Math.max(0,oldRemaining));
      const cashRefund=refund-debtReduction;
      newItems[idx]={...it, returnedQty:(it.returnedQty||0)+sellable};
      newReturns.push({id:uid(), ts:Date.now(), date:todayISO(), itemIndex:idx, name:it.name, qty:sellable, unitPrice:it.unitPrice, amount:refund});
      runningTotal-=refund; runningPaid-=cashRefund; runningCost-=refundCost;
      customerDebtReduction+=debtReduction;
      stockDeltas[it.productId]=(stockDeltas[it.productId]||0)+sellable;
    });

    const batch=writeBatch(db);
    batch.update(doc(cols.sales, sale.id), {
      items:newItems, returns:newReturns, status:'cancelled',
      total:runningTotal, totalCost:runningCost, profit:runningTotal-runningCost,
      paid:runningPaid, remaining:runningTotal-runningPaid
    });
    if(sale.customerId && customerDebtReduction>0){
      batch.update(doc(cols.customers, sale.customerId), { balance: increment(-customerDebtReduction) });
    }
    Object.keys(stockDeltas).forEach(pid=>{
      batch.update(doc(cols.products, pid), { stock: increment(stockDeltas[pid]) });
    });
    batch.commit().catch(e=>{ console.error(e); alert('خطا در باطل کردن فاکتور؛ دوباره تلاش کنید.'); });
  },
  saleIncreaseItemQty(saleId, idx){
    const sale=this.state.sales.find(x=>x.id===saleId); if(!sale) return;
    if(sale.status==='cancelled'){ alert('این فاکتور باطل شده است.'); return; }
    const it=sale.items[idx]; if(!it) return;
    const qtyStr=prompt(`چند عدد دیگر از «${it.name}» اضافه شود؟`,'1');
    if(qtyStr===null) return;
    const qty=parseFloat(qtyStr);
    if(!qty||qty<=0){ alert('تعداد نامعتبر است.'); return; }
    const p=this.state.products.find(pp=>pp.id===it.productId);
    if(p && qty>p.stock){ if(!confirm('موجودی انبار کافی نیست ('+p.stock+' '+it.unit+' باقی‌مانده). ادامه می‌دهید؟')) return; }
    const addAmount=qty*it.unitPrice;
    const paidStr=prompt('مبلغ پرداختی نقدی برای همین اضافه (اگر نسیه است، صفر بگذارید):', addAmount);
    if(paidStr===null) return;
    let addPaid=parseFloat(paidStr); if(isNaN(addPaid)||addPaid<0) addPaid=0; if(addPaid>addAmount) addPaid=addAmount;
    if(addPaid<addAmount && !sale.customerId){ alert('برای نسیه باید فاکتور برای یک مشتری مشخص باشد.'); return; }

    const newItems = sale.items.map((x,i)=> i===idx ? {...x, qty:x.qty+qty} : x);
    const addCost = qty*(it.cost||0);
    const newTotal=sale.total+addAmount, newPaid=sale.paid+addPaid, newTotalCost=sale.totalCost+addCost;

    const batch=writeBatch(db);
    batch.update(doc(cols.sales, sale.id), {
      items:newItems, total:newTotal, originalTotal: increment(addAmount),
      totalCost:newTotalCost, profit:newTotal-newTotalCost, paid:newPaid, remaining:newTotal-newPaid
    });
    if(p) batch.update(doc(cols.products, it.productId), { stock: increment(-qty) });
    if(sale.customerId && addAmount-addPaid>0){
      batch.update(doc(cols.customers, sale.customerId), { balance: increment(addAmount-addPaid) });
    }
    batch.commit().catch(e=>{ console.error(e); alert('خطا؛ دوباره تلاش کنید.'); });
  },
  saleAddItem(saleId){
    const sale=this.state.sales.find(x=>x.id===saleId); if(!sale) return;
    if(sale.status==='cancelled'){ alert('این فاکتور باطل شده است.'); return; }
    const name=prompt('نام محصول جدید برای افزودن به این فاکتور:'); if(name===null) return;
    const trimmed=name.trim(); if(!trimmed){ alert('نام را بنویسید'); return; }
    let product=this.state.products.find(p=>p.name===trimmed);
    const qtyStr=prompt('تعداد:','1'); if(qtyStr===null) return;
    const qty=parseFloat(qtyStr); if(!qty||qty<=0){ alert('تعداد نامعتبر است.'); return; }
    const priceStr=prompt('قیمت فروش هر واحد:', product?product.sellPrice:0); if(priceStr===null) return;
    const price=parseFloat(priceStr); if(isNaN(price)||price<0){ alert('قیمت نامعتبر است.'); return; }

    const batch=writeBatch(db);
    let isNewProduct=false, newProductId=null, cost=0;
    if(!product){
      isNewProduct=true; newProductId=uid(); cost=0;
      if(qty>0){ /* موجودی جدید صفر بود، اضافه شدن این قلم موجودی را منفی می‌کند - طبیعی است، مثل رفتار قبلی */ }
    } else {
      cost=product.avgCost;
      if(qty>product.stock){ if(!confirm('موجودی انبار کافی نیست ('+product.stock+' '+product.unit+' باقی‌مانده). ادامه می‌دهید؟')) return; }
    }
    const addAmount=qty*price;
    const paidStr=prompt('مبلغ پرداختی نقدی برای همین قلم (اگر نسیه است، صفر بگذارید):', addAmount);
    if(paidStr===null) return;
    let addPaid=parseFloat(paidStr); if(isNaN(addPaid)||addPaid<0) addPaid=0; if(addPaid>addAmount) addPaid=addAmount;
    if(addPaid<addAmount && !sale.customerId){ alert('برای نسیه باید فاکتور برای یک مشتری مشخص باشد.'); return; }

    if(isNewProduct){
      batch.set(doc(cols.products,newProductId), {id:newProductId, name:trimmed, unit:'عدد', stock:-qty, avgCost:0, sellPrice:price});
    } else {
      batch.update(doc(cols.products, product.id), { stock: increment(-qty) });
    }
    const newItem = {productId: isNewProduct?newProductId:product.id, name:trimmed, unit: isNewProduct?'عدد':product.unit, qty, unitPrice:price, cost, returnedQty:0};
    const newItems=[...sale.items, newItem];
    const newTotal=sale.total+addAmount, newPaid=sale.paid+addPaid, newTotalCost=sale.totalCost+qty*cost;
    batch.update(doc(cols.sales, sale.id), {
      items:newItems, total:newTotal, originalTotal: increment(addAmount),
      totalCost:newTotalCost, profit:newTotal-newTotalCost, paid:newPaid, remaining:newTotal-newPaid
    });
    if(sale.customerId && addAmount-addPaid>0){
      batch.update(doc(cols.customers, sale.customerId), { balance: increment(addAmount-addPaid) });
    }
    batch.commit().catch(e=>{ console.error(e); alert('خطا؛ دوباره تلاش کنید.'); });
  },

  /* ---------- Invoice adjustments: cancel / return / edit items (purchases) ---------- */
  purchaseReturnItem(purchaseId, idx){
    const pur=this.state.purchases.find(x=>x.id===purchaseId); if(!pur) return;
    if(pur.status==='cancelled'){ alert('این بل خرید باطل شده است.'); return; }
    const it=pur.items[idx]; if(!it) return;
    const returnable = it.qty-(it.returnedQty||0);
    if(returnable<=0){ alert('این قلم قبلاً بطور کامل واپس شده است.'); return; }
    const qtyStr=prompt(`چند عدد از «${it.name}» به فروشنده واپس شود؟ (حداکثر ${returnable} ${it.unit})`, returnable);
    if(qtyStr===null) return;
    const qty=parseFloat(qtyStr);
    if(!qty||qty<=0||qty>returnable){ alert('تعداد نامعتبر است.'); return; }
    const p=this.state.products.find(pp=>pp.id===it.productId);
    if(p && qty>p.stock){ if(!confirm('موجودی فعلی انبار کمتر از این مقدار است ('+p.stock+' '+it.unit+' موجود). آیا مطمئن هستید؟')) return; }
    this._applyPurchaseReturn(pur, idx, qty);
  },
  _applyPurchaseReturn(pur, idx, qty){
    const it=pur.items[idx];
    const refund=qty*it.unitCost;
    const oldRemaining=pur.total-pur.paid;
    const debtReduction=Math.min(refund, Math.max(0,oldRemaining));
    const cashRefund=refund-debtReduction;
    const newItems = pur.items.map((x,i)=> i===idx ? {...x, returnedQty:(x.returnedQty||0)+qty} : x);
    const newReturns = [...pur.returns, {id:uid(), ts:Date.now(), date:todayISO(), itemIndex:idx, name:it.name, qty, unitCost:it.unitCost, amount:refund}];
    const newTotal=pur.total-refund, newPaid=pur.paid-cashRefund;

    const batch=writeBatch(db);
    batch.update(doc(cols.purchases, pur.id), { items:newItems, returns:newReturns, total:newTotal, paid:newPaid, remaining:newTotal-newPaid });
    if(pur.supplierId && debtReduction>0){
      const balField = pur.currency==='USD' ? 'balanceUSD' : 'balance';
      batch.update(doc(cols.suppliers, pur.supplierId), { [balField]: increment(-debtReduction) });
    }
    batch.update(doc(cols.products, it.productId), { stock: increment(-qty) });
    batch.commit().catch(e=>{ console.error(e); alert('خطا؛ دوباره تلاش کنید.'); });
  },
  cancelPurchase(purchaseId){
    const pur=this.state.purchases.find(x=>x.id===purchaseId); if(!pur) return;
    if(pur.status==='cancelled'){ alert('این بل قبلاً باطل شده است.'); return; }
    if(!confirm('کل این بل خرید باطل شود؟ کالاها از انبار کم می‌شود و بدهی به فروشنده اصلاح می‌شود.')) return;
    let ok=true;
    pur.items.forEach((it)=>{
      const returnable=it.qty-(it.returnedQty||0);
      if(returnable>0){
        const p=this.state.products.find(pp=>pp.id===it.productId);
        if(p && returnable>p.stock){ ok=false; }
      }
    });
    if(!ok && !confirm('موجودی فعلی بعضی کالاها کمتر از مقدار خریداری‌شده است (احتمالاً فروخته شده‌اند). آیا باز هم باطل شود؟ (موجودی ممکن است منفی شود)')) return;

    let runningTotal=pur.total, runningPaid=pur.paid, supplierDebtReduction=0;
    const newItems=[...pur.items]; const newReturns=[...pur.returns]; const stockDeltas={};
    pur.items.forEach((it,idx)=>{
      const returnable=it.qty-(it.returnedQty||0);
      if(returnable<=0) return;
      const refund=returnable*it.unitCost;
      const oldRemaining=runningTotal-runningPaid;
      const debtReduction=Math.min(refund, Math.max(0,oldRemaining));
      const cashRefund=refund-debtReduction;
      newItems[idx]={...it, returnedQty:(it.returnedQty||0)+returnable};
      newReturns.push({id:uid(), ts:Date.now(), date:todayISO(), itemIndex:idx, name:it.name, qty:returnable, unitCost:it.unitCost, amount:refund});
      runningTotal-=refund; runningPaid-=cashRefund; supplierDebtReduction+=debtReduction;
      stockDeltas[it.productId]=(stockDeltas[it.productId]||0)-returnable;
    });

    const batch=writeBatch(db);
    batch.update(doc(cols.purchases, pur.id), { items:newItems, returns:newReturns, status:'cancelled', total:runningTotal, paid:runningPaid, remaining:runningTotal-runningPaid });
    if(pur.supplierId && supplierDebtReduction>0){
      const balField = pur.currency==='USD' ? 'balanceUSD' : 'balance';
      batch.update(doc(cols.suppliers, pur.supplierId), { [balField]: increment(-supplierDebtReduction) });
    }
    Object.keys(stockDeltas).forEach(pid=>{
      batch.update(doc(cols.products, pid), { stock: increment(stockDeltas[pid]) });
    });
    batch.commit().catch(e=>{ console.error(e); alert('خطا؛ دوباره تلاش کنید.'); });
  },
  purchaseIncreaseItemQty(purchaseId, idx){

    if(pur.status==='cancelled'){ alert('این بل باطل شده است.'); return; }

    const qtyStr=prompt(`چند عدد دیگر از «${it.name}» اضافه شود؟`,'1');
    if(qtyStr===null) return;
    const qty=parseFloat(qtyStr);
    if(!qty||qty<=0){ alert('تعداد نامعتبر است.'); return; }
    const addAmount=qty*it.unitCost;
    const paidStr=prompt('مبلغ پرداختی نقدی برای همین اضافه (اگر نسیه است، صفر بگذارید):', addAmount);
    if(paidStr===null) return;
    let addPaid=parseFloat(paidStr); if(isNaN(addPaid)||addPaid<0) addPaid=0; if(addPaid>addAmount) addPaid=addAmount;
    if(addPaid<addAmount && !pur.supplierId){ alert('برای نسیه باید بل برای یک فروشنده/شرکت مشخص باشد.'); return; }
    const p=this.state.products.find(pp=>pp.id===it.productId);

    const batch=writeBatch(db);

    if(p){
      const unitCostAFN = pur.currency==='USD' ? it.unitCost*((Number(pur.rateAtPurchase)||this.usdRate())||0) : it.unitCost;
      const newStock=p.stock+qty;
      const newAvgCost = newStock>0 ? ((p.stock*p.avgCost)+(qty*unitCostAFN))/newStock : unitCostAFN;
      batch.update(doc(cols.products, it.productId), { stock: increment(qty), avgCost: newAvgCost });

  },

    const cost=parseFloat(costStr); if(isNaN(cost)||cost<0){ alert('قیمت نامعتبر است.'); return; }
    const addAmount=qty*cost;
    const paidStr=prompt('مبلغ پرداختی نقدی برای همین قلم (اگر نسیه است، صفر بگذارید):', addAmount);
    if(paidStr===null) return;
    let addPaid=parseFloat(paidStr); if(isNaN(addPaid)||addPaid<0) addPaid=0; if(addPaid>addAmount) addPaid=addAmount;
    if(addPaid<addAmount && !pur.supplierId){ alert('برای نسیه باید بل برای یک فروشنده/شرکت مشخص باشد.'); return; }

    const batch=writeBatch(db);
    let productId, unit='عدد';
    const unitCostAFN = pur.currency==='USD' ? cost*((Number(pur.rateAtPurchase)||this.usdRate())||0) : cost;
    if(!product){
      productId=uid();
      batch.set(doc(cols.products, productId), {id:productId, name:trimmed, unit, stock:qty, avgCost:unitCostAFN, sellPrice:Math.round(unitCostAFN*1.15)});
    } else {
      productId=product.id; unit=product.unit;
      const newStock=product.stock+qty;
      const newAvgCost = newStock>0 ? ((product.stock*product.avgCost)+(qty*unitCostAFN))/newStock : unitCostAFN;
      const fields = { stock: increment(qty), avgCost: newAvgCost };
      if(!product.sellPrice) fields.sellPrice = Math.round(unitCostAFN*1.15);
      batch.update(doc(cols.products, productId), fields);
    }
    const newItem={productId, name:trimmed, unit, qty, unitCost:cost, returnedQty:0};
    const newItems=[...pur.items, newItem];
    const newTotal=pur.total+addAmount, newPaid=pur.paid+addPaid;
    batch.update(doc(cols.purchases, pur.id), { items:newItems, total:newTotal, originalTotal: increment(addAmount), paid:newPaid, remaining:newTotal-newPaid });
    if(pur.supplierId && addAmount-addPaid>0){
      const balField = pur.currency==='USD' ? 'balanceUSD' : 'balance';
      batch.update(doc(cols.suppliers, pur.supplierId), { [balField]: increment(addAmount-addPaid) });
    }
    batch.commit().catch(e=>{ console.error(e); alert('خطا؛ دوباره تلاش کنید.'); });
  },

      <div class="field-note" style="margin-top:10px;">نرخ فعلی دالر: <b class="num">${this.usdRate()>0?fmt(this.usdRate()):'—'}</b> <span onclick="App.quickSetUsdRate()" style="cursor:pointer;color:var(--gold-d);text-decoration:underline;">✏️ ویرایش نرخ</span></div>`:''}

  openParty(type,id){ this.sub=type; this.detailId=id; this.payFormOpen=false; this.render(); },

    } else {
      history = this.state.purchases.filter(s=>s.supplierId===p.id).map(s=>({date:s.date,ts:s.ts,label:'خرید'+(s.currency==='USD'?' (دالر)':''),amount:s.total,paid:s.paid,purchaseId:s.id,status:s.status}));

    history = [...history,...pays,...openings].sort((a,b)=>(b.ts||0)-(a.ts||0));

      return `<div class="row-item"${clickAttr}><div class="r-left"><b>${h.label} — مجموع ${fmt(h.amount)}</b>${cancelledTag}<span class="sub">${h.date} · پرداخت‌شده: ${fmt(h.paid)}</span></div><div class="r-right num" style="color:var(--red)">${fmt(h.amount-h.paid)}</div></div>`;

    return `
    <button class="back-btn" onclick="App.closeParty()">← بازگشت به فهرست</button>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <b style="font-size:16px;">${escapeHtml(p.name)}</b>
        <span class="badge ${p.balance>0.5?'red':'green'} num">${fmt(Math.abs(p.balance||0))} ${p.balance>0.5?'بدهکار':((p.balance||0)<-0.5?'طلبکار':'تسویه')}</span>
      </div>
      ${type==='suppliers' && Math.abs(p.balanceUSD||0)>0.5 ? `<div style="margin-top:6px;text-align:left;"><span class="badge ${p.balanceUSD>0.5?'red':'green'} num">$${fmt(Math.abs(p.balanceUSD))} ${p.balanceUSD>0.5?'بدهکار (دالر)':'طلبکار (دالر)'}</span>${this.usdRate()>0?`<div class="sub" style="margin-top:2px;">معادل امروز: ${fmt(Math.abs(p.balanceUSD)*this.usdRate())} ${this.state.settings.currency} (به نرخ ${fmt(this.usdRate())})</div>`:`<div class="sub" style="margin-top:2px;color:var(--red);">نرخ دالر تنظیم نشده — <span onclick="App.quickSetUsdRate()" style="cursor:pointer;text-decoration:underline;">تنظیم کنید</span></div>`}</div>` : ''}
      ${p.phone?`<div class="sub" style="margin-top:6px;">📞 ${escapeHtml(p.phone)}</div>`:''}
      ${p.address?`<div class="sub">📍 ${escapeHtml(p.address)}</div>`:''}
      <div class="grid2" style="margin-top:12px;">
        <button class="btn btn-outline" style="margin-top:0;" onclick="App.editParty('${type}','${p.id}')">✏️ ویرایش اطلاعات</button>
        <button class="btn btn-danger" style="margin-top:0;" onclick="App.deleteParty('${type}','${p.id}')">🗑️ حذف</button>

      ${this.payFormOpen ? `

          <label>${type==='customers'?'مبلغ دریافتی از مشتری':'مبلغ پرداختی به شرکت/عمده‌فروش'}</label>
          <input id="pay-amount" type="number" inputmode="decimal" placeholder="0">
          <label>تاریخ</label>
          <input id="pay-date" type="date" value="${todayISO()}">
          <label>📷 عکس رسید ${type==='suppliers'?'(پیشنهاد می‌شود ضمیمه کنید)':'(اختیاری)'}</label>

            <button class="btn btn-outline" style="margin-top:0;" onclick="App.cancelPartyPaymentForm()">انصراف</button>

          </div>

      </div>` : ''}

    <h2 class="section-title">سابقهٔ معاملات (${history.length})</h2>
    <div class="card">${rows}</div>
    `;

  recordPartyPayment(type,id){
    this.payFormOpen = true;
    this.render();
  },
  cancelPartyPaymentForm(){ this.payFormOpen=false; this.render(); },
  async submitPartyPayment(type,id){
    const amt = parseFloat(document.getElementById('pay-amount').value);
    if(!amt || amt<=0){ alert('مبلغ را درست بنویسید'); return; }
    const date = document.getElementById('pay-date').value || todayISO();
    const arr = type==='customers' ? this.state.customers : this.state.suppliers;
    const p = arr.find(x=>x.id===id);
    if(!p) return;
    const currency = (type==='suppliers' && document.getElementById('pay-currency') && document.getElementById('pay-currency').value==='USD') ? 'USD' : 'AFN';
    let payRate = null;
    if(currency==='USD'){
      payRate = this.usdRate();
      if(payRate<=0){ alert('لطفاً ابتدا نرخ فعلی دالر را تنظیم کنید (از داشبورد یا تنظیمات).'); return; }
    }
    const photoInput = document.getElementById('pay-photo');
    const photoFile = photoInput && photoInput.files[0];
    let receiptImage = null;
    if(photoFile){
      try{ receiptImage = await compressImageForStorage(photoFile); }
      catch(err){ alert(err.message||'خطا در پردازش عکس رسید'); return; }
    }
    const colName = type==='customers' ? 'customers' : 'suppliers';
    const balField = (type==='suppliers' && currency==='USD') ? 'balanceUSD' : 'balance';
    const batch=writeBatch(db);
    batch.update(doc(cols[colName], id), { [balField]: increment(-amt) });
    const paymentId=uid();
    const paymentDoc = {id:paymentId, ts:Date.now(), date, type: type==='customers'?'receive':'pay', partyType:type==='customers'?'customer':'supplier', partyId:id, partyName:p.name, amount:amt, currency};
    if(currency==='USD') paymentDoc.rate = payRate;
    if(receiptImage) paymentDoc.receiptImage = receiptImage;
    batch.set(doc(cols.payments, paymentId), paymentDoc);
    batch.commit().catch(e=>{ console.error(e); alert('خطا؛ دوباره تلاش کنید.'); });
    this.payFormOpen = false;
    this.render();
  },
  viewPaymentReceipt(paymentId){
    const pay = this.state.payments.find(x=>x.id===paymentId);
    if(pay && pay.receiptImage) this.viewImage(pay.receiptImage);
  },
  addPaymentReceiptPhoto(paymentId){
    const input=document.createElement('input');
    input.type='file'; input.accept='image/*'; input.capture='environment';
    input.onchange=async ()=>{
      const file=input.files[0]; if(!file) return;
      try{
        const dataUrl=await compressImageForStorage(file);
        await updateDoc(doc(cols.payments, paymentId), { receiptImage: dataUrl });
      }catch(err){ alert(err.message||'خطا در ذخیرهٔ عکس'); }
    };
    input.click();
  },
  addPartyManual(type){
    const name=(prompt(type==='customers'?'نام مشتری جدید:':'نام شرکت/عمده‌فروش جدید:')||'').trim();
    if(!name) return;
    const arr = type==='customers' ? this.state.customers : this.state.suppliers;
    if(arr.find(x=>x.name===name)){ alert('این نام قبلاً ثبت شده است.'); return; }
    const phone=(prompt('شماره تماس (اختیاری):')||'').trim();
    const address=(prompt('آدرس (اختیاری):')||'').trim();
    const openLabel = type==='customers'
      ? 'اگر این مشتری از قبل به شما بدهکار است، مبلغش را بنویسید'
      : 'اگر شما از قبل (قبل از استفاده از این سیستم) به این شرکت/عمده‌فروش بدهکار هستید، مبلغش را بنویسید';
    const openStr = prompt(openLabel+' (در غیر این صورت 0 بگذارید):','0');
    let openAmt = parseFloat(openStr); if(isNaN(openAmt)) openAmt=0;
    let openCurrency='AFN';
    if(type==='suppliers' && openAmt){
      const curAns=(prompt('این بدهی به کدام ارز است؟ برای افغانی «ا» و برای دالر «د» بنویسید:','ا')||'ا').trim().toLowerCase();
      if(curAns==='د'||curAns==='d'||curAns==='usd'||curAns==='دالر') openCurrency='USD';
    }
    const colName = type==='customers' ? 'customers' : 'suppliers';
    const partyId = uid();
    const batch=writeBatch(db);
    const partyFields = {id:partyId, name, phone, address, balance: openCurrency==='AFN' ? openAmt : 0};
    if(type==='suppliers') partyFields.balanceUSD = openCurrency==='USD' ? openAmt : 0;
    batch.set(doc(cols[colName], partyId), partyFields);
    if(openAmt){
      const openId=uid();
      batch.set(doc(cols.openingEntries, openId), {id:openId, ts:Date.now(), date:todayISO(), partyType:type, partyId, partyName:name, amount:openAmt, currency:openCurrency, note:'بدهی افتتاحیه (قبل از این سیستم)'});
    }
    batch.commit().catch(e=>{ console.error(e); alert('خطا؛ دوباره تلاش کنید.'); });
  },
  setOpeningBalance(type,id){
    const arr = type==='customers' ? this.state.customers : this.state.suppliers;
    const p = arr.find(x=>x.id===id); if(!p) return;
    const label = type==='customers'
      ? 'مبلغی که این مشتری از قبل (قبل از این سیستم) به شما بدهکار است'
      : 'مبلغی که شما از قبل (قبل از این سیستم) به این شرکت/عمده‌فروش بدهکار هستید';
    const amtStr = prompt(label+':', '0');
    if(amtStr===null) return;
    const amt = parseFloat(amtStr);
    if(!amt){ alert('مبلغ نامعتبر یا صفر است.'); return; }
    let currency='AFN';
    if(type==='suppliers'){
      const curAns=(prompt('این بدهی به کدام ارز است؟ برای افغانی «ا» و برای دالر «د» بنویسید:','ا')||'ا').trim().toLowerCase();
      if(curAns==='د'||curAns==='d'||curAns==='usd'||curAns==='دالر') currency='USD';
    }
    const colName = type==='customers' ? 'customers' : 'suppliers';
    const balField = (type==='suppliers' && currency==='USD') ? 'balanceUSD' : 'balance';
    const batch=writeBatch(db);
    batch.update(doc(cols[colName], id), { [balField]: increment(amt) });
    const openId=uid();
    batch.set(doc(cols.openingEntries, openId), {id:openId, ts:Date.now(), date:todayISO(), partyType:type, partyId:id, partyName:p.name, amount:amt, currency, note:'بدهی افتتاحیه (قبل از این سیستم)'});
    batch.commit().then(()=>alert('بدهی افتتاحیه ثبت شد ✅')).catch(e=>{ console.error(e); alert('خطا؛ دوباره تلاش کنید.'); });
  },
  editParty(type,id){
    const arr = type==='customers' ? this.state.customers : this.state.suppliers;
    const p=arr.find(x=>x.id===id); if(!p) return;
    const name=prompt('نام:',p.name); if(name===null) return;
    const trimmed=name.trim();
    if(!trimmed){ alert('نام نمی‌تواند خالی باشد'); return; }
    if(arr.find(x=>x.name===trimmed && x.id!==id)){ alert('طرف‌حساب دیگری با همین نام موجود است.'); return; }
    const phone=prompt('شماره تماس:',p.phone||''); if(phone===null) return;
    const address=prompt('آدرس:',p.address||''); if(address===null) return;
    const colName = type==='customers' ? 'customers' : 'suppliers';
    const batch=writeBatch(db);
    batch.update(doc(cols[colName], id), { name:trimmed, phone:phone.trim(), address:address.trim() });
    if(type==='customers'){
      this.state.sales.forEach(s=>{ if(s.customerId===id) batch.update(doc(cols.sales, s.id), { customerName:trimmed }); });
    } else {
      this.state.purchases.forEach(s=>{ if(s.supplierId===id) batch.update(doc(cols.purchases, s.id), { supplierName:trimmed }); });
    }
    batch.commit().catch(e=>{ console.error(e); alert('خطا؛ دوباره تلاش کنید.'); });
  },
  deleteParty(type,id){
    const arr = type==='customers' ? this.state.customers : this.state.suppliers;
    const p=arr.find(x=>x.id===id); if(!p) return;
    const hasDebt = Math.abs(p.balance||0)>0.5 || (type==='suppliers' && Math.abs(p.balanceUSD||0)>0.5);

    };
    updateDoc(settingsDocRef, fields).then(()=>{

      alert('تنظیمات ذخیره شد ✅');
    }).catch(e=>{ console.error(e); alert('خطا؛ دوباره تلاش کنید.'); });
  },
  _downloadJSON(data, filename){
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  },
  exportBackup(){
    this._downloadJSON(this.state, 'backup-hesabdari-'+todayISO()+'.json');
  },
  async importBackup(input){
    if(!this.isOwner()){ alert('این کار فقط برای مالک/مدیر مجاز است.'); input.value=''; return; }
    const file=input.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=async (e)=>{
      try{
        const parsed=JSON.parse(e.target.result);
        if(!confirm('⚠️ توجه: این کار دیتابیس مشترک همهٔ کاربران (نه فقط همین گوشی) را با فایل انتخابی جایگزین می‌کند. ادامه می‌دهید؟')) { input.value=''; return; }
        if(!confirm('یک نسخه از وضعیت فعلی، قبل از جایگزینی، خودکار دانلود می‌شود تا اگر اشتباهی رخ داد بتوانید برگردید. تأیید می‌کنید؟')) { input.value=''; return; }
        this._downloadJSON(this.state, 'auto-backup-before-import-'+Date.now()+'.json');

        migrateSettings(parsed.settings);
        migrateRecordArrays(parsed.sales, parsed.purchases);

        for(const name of COLLECTIONS){
          const existing = await getDocs(cols[name]);
          const importedIds = new Set((parsed[name]||[]).map(r=>r.id));
          const opsBatchLimit=400;
          let batch=writeBatch(db); let opCount=0;
          const flush=async()=>{ if(opCount>0){ await batch.commit(); batch=writeBatch(db); opCount=0; } };
          for(const d of existing.docs){
            if(!importedIds.has(d.id)){ batch.delete(d.ref); opCount++; if(opCount>=opsBatchLimit) await flush(); }
          }
          for(const rec of (parsed[name]||[])){
            if(!rec.id) rec.id=uid();
            batch.set(doc(cols[name], rec.id), rec); opCount++; if(opCount>=opsBatchLimit) await flush();
          }
          await flush();
        }
        await setDoc(settingsDocRef, migrateSettings(parsed.settings||{}));
        alert('بازیابی موفقانه انجام شد ✅');
        this.navigate('dashboard');
      }catch(err){ console.error(err); alert('فایل پشتیبان معتبر نیست یا خطایی رخ داد.'); }
      input.value='';
    };
    reader.readAsText(file);
  },
  async wipeAll(){
    if(!this.isOwner()){ alert('این کار فقط برای مالک/مدیر مجاز است.'); return; }
    if(!confirm('تمام اطلاعات (فروش، خرید، مصارف، محصولات) برای همیشه پاک می‌شود. مطمئن هستید؟')) return;
    if(!confirm('این کار قابل بازگشت نیست. یک‌بار دیگر تأیید کنید.')) return;
    this._downloadJSON(this.state, 'auto-backup-before-wipe-'+Date.now()+'.json');
    try{
      for(const name of COLLECTIONS){
        const existing = await getDocs(cols[name]);
        let batch=writeBatch(db); let opCount=0;
        for(const d of existing.docs){
          batch.delete(d.ref); opCount++;
          if(opCount>=400){ await batch.commit(); batch=writeBatch(db); opCount=0; }
        }
        if(opCount>0) await batch.commit();
      }
      await setDoc(settingsDocRef, defaultSettings());
      this.navigate('dashboard');
    }catch(e){ console.error(e); alert('خطا در پاک کردن اطلاعات؛ دوباره تلاش کنید.'); }
  },

      <button class="btn btn-outline" onclick="App.exportBackup()">⬇️ دانلود فایل پشتیبان</button>
      ${this.isOwner()?`
      <label style="margin-top:14px;">بازیابی از فایل پشتیبان</label>
      <div class="field-note" style="color:var(--red);">⚠️ این کار دیتابیس مشترک همهٔ کاربران را جایگزین می‌کند، نه فقط اطلاعات همین گوشی را.</div>
      <input type="file" accept="application/json" onchange="App.importBackup(this)">
      `:`<div class="field-note">بازیابی از فایل پشتیبان فقط برای مالک/مدیر در دسترس است.</div>`}
    </div>
    ${this.isOwner()?`
    <h2 class="section-title">منطقهٔ خطر</h2>
    <div class="card">
      <div class="field-note" style="color:var(--red);">⚠️ این کار همهٔ اطلاعات را برای همهٔ کاربران پاک می‌کند. قبل از پاک کردن، یک نسخهٔ پشتیبان خودکار دانلود می‌شود.</div>
      <button class="btn btn-danger" onclick="App.wipeAll()">پاک کردن همهٔ اطلاعات</button>
    </div>`:''}
    `;
  },
};

window.App = App;
App.init();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW register failed', err));
    });
  }
</script>
</body>
</html>
